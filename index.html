<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lala Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  perspective: 1000px;
}

/* Header */
header {
  text-align: center;
  padding: 30px;
  font-size: 32px;
  letter-spacing: 2px;
}

/* Glass Card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px;
  margin: 20px auto;
  width: 300px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  transform-style: preserve-3d;
  transition: 0.5s;
}

/* 3D Hover Effect */
.card:hover {
  transform: rotateY(10deg) rotateX(10deg) scale(1.05);
  box-shadow: 0 20px 60px rgba(255,215,0,0.2);
}

/* Inputs */
input, button {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border: none;
  border-radius: 8px;
}

button {
  background: linear-gradient(45deg, gold, orange);
  cursor: pointer;
  font-weight: bold;
}

/* Sections */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* Glow text */
h2 {
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
</style>
</head>

<body>

<header>🍽️ Lala Restaurant</header>

<div class="container">

<!-- AUTH -->
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
<p id="user"></p>
</div>

<!-- BOOKING -->
<div class="card">
<h2>Book Table</h2>
<input id="name" placeholder="Name">
<input id="date" type="date">
<button onclick="book()">Reserve</button>
<p id="msg"></p>
</div>

<!-- CHAT -->
<div class="card">
<h2>Chat</h2>
<input id="chatMsg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
<div id="chat"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8KmrKZhN8S5nJqdVHJEab0A-1OZMYItE",
  authDomain: "resturant-d1914.firebaseapp.com",
  projectId: "resturant-d1914",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH
window.register = async () => {
  const email = emailInput();
  const pass = passInput();
  await createUserWithEmailAndPassword(auth, email, pass);
  alert("Registered!");
};

window.login = async () => {
  const email = emailInput();
  const pass = passInput();
  const user = await signInWithEmailAndPassword(auth, email, pass);
  document.getElementById("user").innerText = user.user.email;
};

// BOOKING
window.book = async () => {
  await addDoc(collection(db, "bookings"), {
    name: document.getElementById("name").value,
    date: document.getElementById("date").value
  });
  document.getElementById("msg").innerText = "✅ Booked!";
};

// CHAT
window.sendMsg = async () => {
  const msg = document.getElementById("chatMsg").value;
  await addDoc(collection(db, "chat"), { msg });
};

onSnapshot(collection(db, "chat"), (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  snapshot.forEach(doc => {
    let p = document.createElement("p");
    p.innerText = doc.data().msg;
    chat.appendChild(p);
  });
});

// helpers
function emailInput(){
  return document.getElementById("email").value;
}
function passInput(){
  return document.getElementById("password").value;
}
</script>

</body>
</html>
