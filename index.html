<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lala Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  background: rgba(0,0,0,0.8);
  padding: 20px;
  text-align: center;
  font-size: 30px;
  letter-spacing: 2px;
}

section {
  padding: 60px 20px;
  text-align: center;
}

h1 {
  font-size: 40px;
}

.btn {
  background: gold;
  padding: 12px 25px;
  border: none;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

.success {
  color: lightgreen;
}
</style>
</head>

<body>

<header>🍽️ Lala Restaurant</header>

<section>
<h1>Luxury Dining Experience</h1>
<p>Fine food, music, and unforgettable nights</p>
<button class="btn" onclick="scrollToBooking()">Reserve Now</button>
</section>

<section>
<h2>⭐ 4.8 Rating (2,983 Reviews)</h2>
<p>"Best burger ever!"</p>
<p>"Amazing service and atmosphere"</p>
</section>

<section id="booking">
<div class="card">
<h2>Reserve a Table</h2>

<form onsubmit="bookTable(event)">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="date" id="date" required>
<input type="time" id="time" required>

<select id="people">
<option>1 Person</option>
<option>2 People</option>
<option>3 People</option>
<option>4 People</option>
<option>5+ People</option>
</select>

<button class="btn">Confirm</button>
</form>

<p id="msg" class="success"></p>

</div>
</section>

<script type="module">
// 🔥 Firebase Import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔴 حط بياناتك هون
const firebaseConfig = {
  apiKey: "PUT-YOUR-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-PROJECT-ID",
  storageBucket: "YOUR-PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

// تشغيل Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Scroll
window.scrollToBooking = function () {
  document.getElementById("booking").scrollIntoView({ behavior: "smooth" });
}

// Booking Function
window.bookTable = async function (e) {
  e.preventDefault();

  const booking = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    people: document.getElementById("people").value
  };

  try {
    await addDoc(collection(db, "bookings"), booking);
    document.getElementById("msg").innerText =
      "✅ Reservation Confirmed!";
    e.target.reset();
  } catch (err) {
    document.getElementById("msg").innerText =
      "❌ Error, try again.";
  }
};
</script>

</body>
</html>
